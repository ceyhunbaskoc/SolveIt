version: '3.8'

services:

  # ── MongoDB ───────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    platform: linux/amd64
    container_name: solveit-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: solveit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ──────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    platform: linux/amd64
    container_name: solveit-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Yönetim paneli → http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: ./solveit-backend
      dockerfile: Dockerfile
    container_name: solveit-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/solveit
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Jenkins ───────────────────────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts
    platform: linux/amd64
    container_name: solveit-jenkins
    ports:
      - "8080:8080"    # Jenkins UI → http://localhost:8080
      - "50000:50000"  # Jenkins agent bağlantı portu
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  jenkins_home:
